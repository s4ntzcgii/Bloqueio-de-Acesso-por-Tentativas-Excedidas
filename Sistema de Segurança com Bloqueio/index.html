<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="terminal">
        <div class="cabecalho">
            <h1>TERMINAL DE SEGURANÇA</h1>
            <h2>Cyber-SENAI</h2>
        </div>

        <div class="formulario" id="formLogin">
            <div class="campo">
                <label>Login:</label>
                <input type="text" id="login" placeholder="usuário">
            </div>
            <div class="campo">
                <label>Senha:</label>
                <input type="password" id="senha" placeholder="******">
            </div>
            <button id="entrar">Entrar</button>
        </div>

        <div class="saida" id="saida">
            Aguardando autenticação...
        </div>

        <div class="status">
            <span id="vidas">Vidas: 3/3</span>
            <span id="situacao">Livre</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
